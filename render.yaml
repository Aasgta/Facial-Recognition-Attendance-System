services:
  - type: web
    name: fastapi-attendance
    env: python
    region: singapore
    buildCommand: |
      apt-get update && apt-get install -y libjpeg-dev zlib1g-dev libpng-dev libtiff-dev libopenjp2-7-dev
      pip install --upgrade pip setuptools wheel
      # Pre-install a compatible Pillow before anything else
      pip install --no-cache-dir Pillow==9.5.0
      # Temporarily rename requirements.txt so Pillow 10.1.0 isn't rebuilt
      mv requirements.txt req_backup.txt
      grep -v "Pillow" req_backup.txt > requirements.txt
      pip install --no-cache-dir -r requirements.txt
      mv req_backup.txt requirements.txt
    startCommand: bash start.sh