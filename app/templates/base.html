<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Attendance System{% endblock %}</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/static/css/styles.css" />

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #0b0f1f, #000);
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #00e5ff33;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 0 20px #00e5ff33;
    }

    header h1 {
      color: #00e5ff;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00e5ff;
    }

    nav a {
      color: #e0e0e0;
      text-decoration: none;
      margin: 0 12px;
      font-weight: 500;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #00e5ff;
    }

    .container {
      padding: 60px 20px;
      text-align: center;
      animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #00e5ff;
      text-shadow: 0 0 15px #00e5ff;
      margin-bottom: 10px;
    }

    p {
      color: #928f8f;
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      margin-bottom: 50px;
    }

    .btn {
      background: linear-gradient(90deg, #00e5ff, #00bcd4);
      color: #000;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 0 15px #00e5ffaa;
      transition: all 0.3s ease;
    }

    .btn:hover {
      box-shadow: 0 0 25px #00e5ff;
      transform: translateY(-3px);
    }

    .info {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      max-width: 700px;
      margin: auto;
      padding: 20px 30px;
      text-align: left;
      box-shadow: 0 0 20px #00e5ff22;
    }

    ul {
      list-style-type: none;
      padding-left: 10px;
    }

    ul li::before {
      content: "🤖 ";
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 0.9rem;
      color: #888;
      text-align: center;
      border-top: 1px solid #00e5ff33;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, #00e5ff11 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
      animation: pulse 8s infinite alternate;
    }

    @keyframes pulse {
      from {opacity: 0.4;}
      to {opacity: 0.8;}
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>
  <header>
    <h1>AI Attendance</h1>
    <nav>
      <a href="/">🏠 Home</a>
      <a href="/register/">🧍 Register</a>
      <a href="/train/">🧠 Train</a>
      <a href="/attendance/subject">📋 Attendance</a>
      <a href="/attendance/">📂 View Records</a>
    </nav>
  </header>

  {% block content %}{% endblock %}

  <footer>
    © 2026 Smart AI Attendance System — Powered by FastAPI & OpenCV
  </footer>
</body>
</html>
