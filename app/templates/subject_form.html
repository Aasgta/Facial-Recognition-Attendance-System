{% extends "base.html" %}
{% block content %}
<h2>Start Attendance</h2>
<form action="/attendance/subject" method="post">
  <label>Enter Subject Name:</label>
  <input type="text" name="subject" required />
  <button type="submit">Start</button>
</form>
{% if msg %}
<p><strong>{{ msg }}</strong></p>
{% endif %}
{% endblock %}
